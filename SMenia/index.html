<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnakeMenia</title>
</head>
<style>
  *{
    padding: 0;
    margin: 0;
  }
  .body{
    background-image: url(image/download.jpg);
    min-height: 100vh;
    background-size: 100vw 100vh;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #scoreBox{
    position: absolute;
    top:9px;
    right: 200px;
    font-size: 39px;
    font-weight: bold;
  }
  #hiscoreBox{
    position: absolute;
    top:59px;
    right: 140px;
    font-size: 39px;
    font-weight: bold;
    font-family: 'New Tegomin', serif;

  }
  #board{
    background-color: green;
    width: 90vmin;
    height: 92vmin;
    border: 2px solid black;
    display: grid;
    grid-template-rows: repeat(18, 1fr);
    grid-template-columns: repeat(18, 1fr);

}

.head{
    background: linear-gradient(red,yellow);
    border: 2px solid purple;
    transform: scale(1.02);
    border-radius: 9px;
}
.snake{
    background-color: purple;
    border: .25vmin solid white;
    border-radius:  12px;
}
.food{
    background: linear-gradient(red,purple);
    border: .25vmin solid black;
    border-radius: 8px;

}

</style>

<body>
    <div class="body">
        <div id="scoreBox">Score : 0</div>
        <div id="hiscoreBox">Hi score :0</div>
        <div id="board"> </div>

        </div>

    <script>
    let inputDir = {x: 0, y:0};
    const foodSound = new Audio('mixkit-chewing-something-crunchy-2244.wav');
    const gameOverSound = new Audio('mixkit-explosion-in-battle-2809.wav');
    const moveSound = new Audio('neon-gaming-128925.mp3');
    const musicSound = new Audio('snake-hiss-95241.mp3');
    let speed=5;
    let score=0;
    let lastPaintTime = 0;
    let snakeArr = [
        {x: 13, y: 15}
    ]
    food = {x:6 , y:7};

   function main(ctime){
    window.requestAnimationFrame(main);
   // console.log(ctime)
    if((ctime - lastPaintTime)/1000 < 1/speed){
        return;
    }
    lastPaintTime = ctime;
    gameEngine();
    
   }

   function isCollide(snake){
    for(let i=1; i<snakeArr.length; i++){
        if(snake[i].x === snake[0].x && snake[i].y === snake[0].y){
            return true;
        }
    }
    if(snake[0].x >= 18 || snake[0].x <= 0 || snake[0].y >= 18 || snake[0].y <=0){
        return true;
    }

   }

   function gameEngine(){
     
    if(isCollide(snakeArr)){
        gameOverSound.play();
        musicSound.pause();
        inputDir={x:0,y:0};
        alert("game over , press any key to play again !");
        snakeArr=[{x:13, y:15}];
        musicSound.play();
        score=0;
    }
    if(snakeArr[0].y === food.y && snakeArr[0].x === food.x){
        foodSound.play();
        score += 1;
        if(score>hiscoreval){
            hiscoreval = score;
            localStorage.setItem("hiscore", JSON.stringify(hiscoreval));
            hiscoreBox.innerHTML = "HiScore: " + hiscoreval;
        }
        scoreBox.innerHTML = "Score: "+ score;
        snakeArr.unshift({x: snakeArr[0].x + inputDir.x, y: snakeArr[0].y +
        inputDir.y});
        let a=2;
        let b=16;
        food = {x: Math.round(a + (b-a)* Math.random()), y:Math.round(a + (b-a)*
        Math.random())}
    }
      for(let i = snakeArr.length-2; i>=0; i--){
        
        snakeArr[i+1] = {...snakeArr[i]};
      }

      snakeArr[0].x += inputDir.x;
      snakeArr[0].y += inputDir.y;
    
    board.innerHTML = "";
    snakeArr.forEach((e,index)=>{
        snakeElement = document.createElement('div');
        snakeElement.style.gridRowStart = e.y;
        snakeElement.style.gridColumnStart= e.x;
        
        if(index === 0){
            snakeElement.classList.add('head');
        }
        else{
            snakeElement.classList.add('snake');
        }
        board.appendChild(snakeElement);  
     });
      
        foodElement = document.createElement('div');
        foodElement.style.gridRowStart = food.y;
        foodElement.style.gridColumnStart= food.x;
        foodElement.classList.add('food');
        board.appendChild(foodElement);  

     }

     let hiscore = localStorage.getItem("hiscore");
     if(hiscore === null){
        hiscoreval = 0;
        localStorage.setItem("hiscore", JSON.stringify(hiscoreval))
     }
     else{
        hiscoreval = JSON.parse(hiscore);
        hiscoreBox.innerHTML = "hiscore: "+ hiscore;
     }

    window.requestAnimationFrame(main);
    window.addEventListener('keydown',e=>{
        inputDir = {x: 0,y: 1}
        moveSound.play();
        switch(e.key){
            case "ArrowUp":
                console.log("ArrowUp");
                inputDir.x=0;
                inputDir.y=-1;
                break;

            case "ArrowDown":
                console.log("ArrowDown");
                inputDir.x=0;
                inputDir.y=1;
                break;

            case "ArrowLeft":
                console.log("ArrowLeft");
                inputDir.x=-1;
                inputDir.y=0;
                break;

            case "ArrowRight":
                console.log("ArrowRight");
                inputDir.x=1;
                inputDir.y=0;
                break;
        
                default:
                    break;
        }
    })     

    </script>
</body>
</html>
